<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Smart Farm Story Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="m-0">
  <div id="root" class="min-h-screen grid place-items-center bg-sky-50 p-8">
    <div class="rounded-2xl bg-white p-8 text-center shadow-xl">
      <h1 class="mb-3 text-2xl font-black text-green-700">🌾 My Smart Farm Story</h1>
      <p class="mb-4 text-slate-600">Choose the TSX file to start the preview.</p>
      <input id="file" type="file" accept=".tsx,.ts" class="rounded-xl border p-3" />
    </div>
  </div>
  <script>
    function mount(source) {
      const clean = source.replace(/export default function App/, 'function App');
      const compiled = Babel.transform(clean, { presets: ['typescript', 'react'] }).code;
      const run = new Function('React', 'ReactDOM', compiled + '\nreturn App;');
      const App = run(React, ReactDOM);
      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    }
    function showError(error) {
      document.getElementById('root').innerHTML = '<pre style="padding:2rem;color:#b91c1c">Preview failed: ' + error + '</pre>';
    }
    document.getElementById('file').addEventListener('change', event => {
      const file = event.target.files && event.target.files[0];
      if (file) file.text().then(mount).catch(showError);
    });
    fetch('./my_smart_farm_story.tsx')
      .then(response => response.text())
      .then(mount)
      .catch(() => {});
  </script>
</body>
</html>
